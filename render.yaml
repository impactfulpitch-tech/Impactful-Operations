services:
  # Backend API Service
  - type: web
    name: workflow-hub-backend
    runtime: node
    runtimeVersion: 20

    region: oregon
    plan: free

    buildCommand: cd backend && npm install && npm run build && npx prisma db push --skip-generate
    startCommand: cd backend && node dist/server.js

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://workflow-hub-frontend.onrender.com

    autoDeploy: true

  # Frontend Service
  - type: static
    name: workflow-hub-frontend
    staticPublishPath: ./frontend/dist
    buildCommand: cd frontend && npm install && npm run build

    routes:
      - path: /*
        destination: /index.html

    envVars:
      - key: VITE_API_URL
        value: https://workflow-hub-backend.onrender.com

    autoDeploy: true
